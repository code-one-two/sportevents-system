server:
  port: ${SERVER_PORT:1194}

spring:
  config:
    import: optional:classpath:application-local.yml
  datasource:
    url: jdbc:h2:file:./data/gym_equipment;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:abc123456789abc123456789abc123456}
  expiration: ${JWT_EXPIRATION:86400000}

deepseek:
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
